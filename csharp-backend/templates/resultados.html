<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados Extraídos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-1: #eef7ff;
            --bg-2: #e9fbf5;
            --surface: #ffffff;
            --line: #d5e3ef;
            --ink: #102f45;
            --ink-soft: #4b677b;
            --primary: #0f766e;
            --primary-strong: #0c5f59;
            --accent: #d95f00;
            --danger: #be123c;
            --muted-btn: #dde8ef;
            --shadow: 0 20px 48px rgba(11, 50, 79, 0.14);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Manrope", "Segoe UI", sans-serif;
            color: var(--ink);
            min-height: 100vh;
            padding: 22px;
            background:
                radial-gradient(circle at 12% 10%, #d9eefc 0, #d9eefc 18%, transparent 38%),
                radial-gradient(circle at 88% 85%, #d8f4eb 0, #d8f4eb 20%, transparent 36%),
                linear-gradient(140deg, var(--bg-1), var(--bg-2));
        }

        .page-shell {
            width: min(1280px, 100%);
            margin: 0 auto;
            display: grid;
            gap: 16px;
        }

        .topbar {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.95);
            border-radius: 22px;
            backdrop-filter: blur(7px);
            box-shadow: var(--shadow);
            padding: 22px;
            display: flex;
            justify-content: space-between;
            gap: 18px;
            flex-wrap: wrap;
        }

        .panel-tag {
            display: inline-block;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .4px;
            color: var(--primary-strong);
            background: #e9fff8;
            border: 1px solid #b7ecde;
            border-radius: 999px;
            padding: 6px 11px;
            margin-bottom: 8px;
        }

        h1 {
            font-family: "Fraunces", "Georgia", serif;
            font-size: clamp(28px, 4vw, 42px);
            line-height: 1.12;
            margin-bottom: 6px;
            color: #12364a;
        }

        .topbar p {
            color: var(--ink-soft);
            font-size: 14px;
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            border: 0;
            text-decoration: none;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 800;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform .16s ease, filter .2s ease;
            color: #173549;
            background: var(--muted-btn);
        }

        .btn:hover {
            transform: translateY(-1px);
            filter: brightness(0.98);
        }

        .btn-primary {
            background: linear-gradient(135deg, #14947f, #0f766e);
            color: #fff;
        }

        .btn-accent {
            background: linear-gradient(135deg, #e77002, #d95f00);
            color: #fff;
        }

        .btn-muted {
            background: var(--muted-btn);
            color: #173549;
        }

        .btn-danger {
            background: linear-gradient(135deg, #de3c63, #be123c);
            color: #fff;
        }

        .state-card,
        .table-wrap {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 18px;
            box-shadow: 0 10px 28px rgba(14, 52, 78, 0.08);
        }

        .state-card {
            padding: 44px 20px;
            text-align: center;
        }

        .state-card p {
            margin-top: 12px;
            color: var(--ink-soft);
        }

        .spinner {
            border: 4px solid #ebf0f4;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        .empty-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #f2fbff;
            border: 1px solid #d6e9f7;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
        }

        .table-wrap {
            overflow: hidden;
        }

        .table-scroll {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 860px;
        }

        th {
            background: #143f58;
            color: #fff;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: .4px;
            text-align: left;
            padding: 14px 12px;
            white-space: nowrap;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #e4edf4;
            color: #1d415a;
            font-size: 13px;
            vertical-align: top;
        }

        tbody tr:hover {
            background: #f6fbff;
        }

        tbody tr:last-child td {
            border-bottom: 0;
        }

        .actions {
            display: flex;
            gap: 8px;
            min-width: 226px;
        }

        .btn-action {
            border: 0;
            border-radius: 8px;
            padding: 7px 10px;
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: transform .15s ease, filter .2s ease;
        }

        .btn-action:hover {
            transform: translateY(-1px);
            filter: brightness(0.98);
        }

        .btn-view {
            background: #e8f4ff;
            color: #0e5f98;
        }

        .btn-edit {
            background: #fff5e8;
            color: #a24f00;
        }

        .btn-delete {
            background: #ffe7ee;
            color: #be123c;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(12, 33, 48, 0.58);
            backdrop-filter: blur(4px);
            z-index: 2400;
            padding: 18px;
        }

        .modal-content {
            width: min(760px, 96vw);
            max-height: calc(100vh - 36px);
            overflow-y: auto;
            margin: 0 auto;
            background: #fff;
            border-radius: 16px;
            border: 1px solid var(--line);
            box-shadow: 0 22px 48px rgba(8, 36, 55, 0.36);
            padding: 22px;
            animation: rise-in .24s ease-out;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #d9e6ef;
            padding-bottom: 12px;
            margin-bottom: 12px;
        }

        .modal-header h2 {
            font-size: 22px;
            font-family: "Fraunces", "Georgia", serif;
            color: #154258;
        }

        .close {
            border: 0;
            background: #edf4f9;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            font-size: 21px;
            line-height: 1;
            cursor: pointer;
            color: #2d4a60;
        }

        .detail-row {
            padding: 10px 0;
            border-bottom: 1px solid #e6eef4;
            display: grid;
            grid-template-columns: 170px minmax(0, 1fr);
            gap: 10px;
            align-items: center;
            font-size: 13px;
        }

        .detail-row:last-child {
            border-bottom: 0;
        }

        .detail-row strong {
            color: #15506c;
        }

        .detail-row input {
            width: 100%;
            border: 1px solid #c9d9e5;
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 13px;
            color: #1f4058;
        }

        .detail-row input:focus {
            outline: none;
            border-color: #2f8b9b;
            box-shadow: 0 0 0 3px rgba(47, 139, 155, 0.14);
        }

        .edit-banner {
            margin-bottom: 14px;
            background: #f0f9ff;
            border: 1px solid #bedef4;
            color: #0f628e;
            border-radius: 10px;
            padding: 11px 12px;
            font-size: 13px;
            font-weight: 700;
        }

        .modal-actions {
            margin-top: 18px;
            display: flex;
            gap: 10px;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes rise-in {
            from { transform: translateY(8px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @media (max-width: 820px) {
            body {
                padding: 14px;
            }

            .topbar {
                padding: 18px;
            }

            .toolbar {
                width: 100%;
            }

            .btn {
                flex: 1;
                min-width: 140px;
            }

            .detail-row {
                grid-template-columns: 1fr;
                gap: 6px;
            }

            .modal-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="page-shell">
    <header class="topbar">
        <div>
            <span class="panel-tag">Panel administrativo</span>
            <h1>Resultados extraídos</h1>
            <p>Consulta, edita y depura la información procesada de pacientes.</p>
        </div>

        <div class="toolbar">
            <button class="btn btn-muted" onclick="cargarResultados()">Actualizar</button>
            <a href="/descargar-todos" class="btn btn-accent">Excel general</a>
            <a href="/" class="btn btn-primary">Volver a carga</a>
            <a href="/logout" class="btn btn-muted">Cerrar sesión</a>
        </div>
    </header>

    <section id="loading" class="state-card">
        <div class="spinner"></div>
        <p>Cargando resultados...</p>
    </section>

    <section id="content" style="display: none;">
        <div class="table-wrap" id="tableContainer"></div>
    </section>

    <section id="emptyState" class="state-card" style="display: none;">
        <div class="empty-icon">📭</div>
        <p>No hay datos procesados todavía.</p>
        <p style="font-size: 13px;">Los registros aparecerán aquí cuando se procesen imágenes.</p>
    </section>
</div>

<div id="detailModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Detalles del paciente</h2>
            <button class="close" onclick="cerrarModal()" aria-label="Cerrar">×</button>
        </div>
        <div id="detailContent"></div>
    </div>
</div>

<script>
    function escapeHtml(value) {
        return String(value ?? "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
    }

    function cargarResultados() {
        document.getElementById("loading").style.display = "block";
        document.getElementById("content").style.display = "none";
        document.getElementById("emptyState").style.display = "none";

        fetch("/api/resultados")
            .then(r => {
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                return r.json();
            })
            .then(data => mostrarResultados(data))
            .catch(e => {
                console.error("Error cargando resultados:", e);
                document.getElementById("loading").style.display = "none";
                document.getElementById("emptyState").style.display = "block";
            });
    }

    function mostrarResultados(resultados) {
        document.getElementById("loading").style.display = "none";

        if (!resultados || resultados.length === 0) {
            document.getElementById("emptyState").style.display = "block";
            document.getElementById("content").style.display = "none";
            return;
        }

        document.getElementById("emptyState").style.display = "none";
        document.getElementById("content").style.display = "block";

        const campos = ["Nombre", "Tipo de Documento", "Número Documento", "Edad", "Especialidad", "Diagnóstico"];
        let html = '<div class="table-scroll"><table><thead><tr>';

        campos.forEach(campo => {
            html += `<th>${escapeHtml(campo)}</th>`;
        });
        html += "<th>Acciones</th></tr></thead><tbody>";

        resultados.forEach((item, idx) => {
            html += "<tr>";
            const tipoDocumento = item["Tipo de Documento"] || (item["RC"] ? "RC" : "");
            const numeroDocumento = item["Número Documento"] || item["RC"] || "";

            campos.forEach(campo => {
                let valor = item[campo] || "";
                if (campo === "Tipo de Documento") valor = tipoDocumento;
                if (campo === "Número Documento") valor = numeroDocumento;
                html += `<td>${escapeHtml(valor || "-")}</td>`;
            });

            html += `<td class="actions">
                <button class="btn-action btn-view" onclick="verDetalles(${idx})">Ver</button>
                <button class="btn-action btn-edit" onclick="editarRegistro(${idx})">Editar</button>
                <button class="btn-action btn-delete" onclick="eliminar(${idx})">Eliminar</button>
            </td></tr>`;
        });

        html += "</tbody></table></div>";
        document.getElementById("tableContainer").innerHTML = html;
    }

    function verDetalles(idx) {
        fetch("/api/resultados")
            .then(r => {
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                return r.json();
            })
            .then(data => {
                if (data && data[idx]) {
                    const item = data[idx];
                    let html = "";
                    for (const [key, value] of Object.entries(item)) {
                        html += `<div class="detail-row"><strong>${escapeHtml(key)}:</strong> ${escapeHtml(value || "-")}</div>`;
                    }
                    document.getElementById("detailContent").innerHTML = html;
                    document.getElementById("detailModal").style.display = "block";
                }
            })
            .catch(e => console.error("Error:", e));
    }

    function editarRegistro(idx) {
        fetch("/api/resultados")
            .then(r => {
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                return r.json();
            })
            .then(data => {
                if (data && data[idx]) {
                    const item = data[idx];
                    let html = '<div class="edit-banner">Modo edición activo: ajusta los campos y guarda los cambios.</div>';
                    for (const [key, value] of Object.entries(item)) {
                        html += `<div class="detail-row">
                            <strong>${escapeHtml(key)}:</strong>
                            <input type="text" value="${escapeHtml(value || "")}" data-field="${escapeHtml(key)}" data-idx="${idx}">
                        </div>`;
                    }
                    html += '<div class="modal-actions"><button class="btn btn-primary" onclick="guardarCambios()" style="flex: 1;">Guardar cambios</button><button class="btn btn-muted" onclick="cerrarModal()" style="flex: 1;">Cancelar</button></div>';
                    document.getElementById("detailContent").innerHTML = html;
                    document.getElementById("detailModal").style.display = "block";
                }
            })
            .catch(e => console.error("Error:", e));
    }

    function guardarCambios() {
        const inputs = document.querySelectorAll("#detailContent input[type='text']");
        const cambios = {};
        let idx = null;

        inputs.forEach(input => {
            cambios[input.dataset.field] = input.value;
            if (idx === null) idx = input.dataset.idx;
        });

        fetch(`/actualizar/${idx}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(cambios)
        })
        .then(() => {
            cerrarModal();
            cargarResultados();
        })
        .catch(e => {
            alert("Error al guardar: " + e);
            console.error("Error:", e);
        });
    }

    function cerrarModal() {
        document.getElementById("detailModal").style.display = "none";
    }

    function descargarExcel(idx) {
        window.location.href = `/descargar/${idx}`;
    }

    function eliminar(idx) {
        if (confirm("¿Estás seguro de que deseas eliminar este registro?")) {
            fetch(`/eliminar/${idx}`, { method: "DELETE" })
                .then(() => cargarResultados());
        }
    }

    window.onclick = function(event) {
        const modal = document.getElementById("detailModal");
        if (event.target === modal) modal.style.display = "none";
    };

    cargarResultados();
    setInterval(cargarResultados, 5000);
</script>

</body>
</html>
