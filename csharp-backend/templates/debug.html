<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug OCR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #15364c;
            --ink-soft: #4a6679;
            --primary: #0f766e;
            --line: #d7e4ee;
            --surface: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Manrope", "Segoe UI", sans-serif;
            min-height: 100vh;
            color: var(--ink);
            padding: 20px;
            background:
                radial-gradient(circle at 18% 12%, #d8f2ec 0, #d8f2ec 19%, transparent 42%),
                radial-gradient(circle at 86% 86%, #dce8ff 0, #dce8ff 19%, transparent 42%),
                linear-gradient(140deg, #eef8f7, #ebf3ff);
        }

        .container {
            width: min(980px, 100%);
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.95);
            border-radius: 22px;
            box-shadow: 0 24px 46px rgba(11, 50, 79, 0.16);
            padding: 26px;
        }

        .tag {
            display: inline-flex;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .4px;
            color: #0b5f59;
            background: #ecfffb;
            border: 1px solid #beece3;
            border-radius: 999px;
            padding: 6px 10px;
            margin-bottom: 10px;
        }

        h1 {
            font-family: "Fraunces", "Georgia", serif;
            font-size: clamp(28px, 4vw, 42px);
            line-height: 1.1;
            margin-bottom: 6px;
            color: #163c52;
        }

        .subtitle {
            color: var(--ink-soft);
            font-size: 14px;
            margin-bottom: 18px;
        }

        .info {
            background: #f1f9ff;
            border: 1px solid #c8def0;
            border-left: 4px solid #1983b3;
            border-radius: 12px;
            padding: 14px;
            font-size: 13px;
            color: #15557a;
            margin-bottom: 18px;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        input[type="file"] {
            flex: 1;
            min-width: 220px;
            border: 1px solid #c7d8e5;
            border-radius: 10px;
            padding: 9px;
            background: #fff;
            color: #25485e;
        }

        button {
            border: 0;
            border-radius: 10px;
            padding: 10px 16px;
            font-size: 13px;
            font-weight: 800;
            cursor: pointer;
            color: #fff;
            background: linear-gradient(135deg, #14947f, #0f766e);
            transition: transform .15s ease, filter .2s ease;
        }

        button:hover {
            transform: translateY(-1px);
            filter: brightness(0.97);
        }

        h3 {
            margin-bottom: 10px;
            color: #1f4a62;
            font-size: 17px;
        }

        textarea {
            width: 100%;
            min-height: 440px;
            border: 1px solid #c9d9e5;
            border-radius: 12px;
            padding: 12px;
            font-size: 13px;
            line-height: 1.45;
            color: #203f55;
            resize: vertical;
            background: #fcfeff;
            font-family: "Consolas", "Courier New", monospace;
        }

        textarea:focus {
            outline: none;
            border-color: #2f8b9b;
            box-shadow: 0 0 0 3px rgba(47, 139, 155, 0.14);
        }

        @media (max-width: 700px) {
            body {
                padding: 12px;
            }

            .container {
                padding: 18px;
            }

            textarea {
                min-height: 320px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <span class="tag">Herramienta técnica</span>
    <h1>Debug OCR</h1>
    <p class="subtitle">Sube una imagen para revisar exactamente qué texto extrae el OCR y ajustar patrones de parsing.</p>

    <div class="info">
        <strong>Instrucciones:</strong> carga una imagen y revisa la salida completa para validar caracteres, saltos de línea y estructura detectada.
    </div>

    <div class="controls">
        <input type="file" id="fileInput" accept="image/*">
        <button onclick="enviar()">Procesar imagen</button>
    </div>

    <h3>Resultado OCR</h3>
    <textarea id="resultado" readonly placeholder="El texto extraído aparecerá aquí..."></textarea>
</div>

<script>
    function enviar() {
        const file = document.getElementById("fileInput").files[0];
        if (!file) {
            alert("Selecciona una imagen primero");
            return;
        }

        const formData = new FormData();
        formData.append("imagen", file);

        fetch("/debug/text", {
            method: "POST",
            body: formData
        })
        .then(r => r.json())
        .then(data => {
            let output = "=== INFORMACION ===\n";
            output += `Tamano imagen: ${data.imagen_shape}\n`;
            output += `Caracteres extraidos: ${data.texto_length}\n\n`;
            output += "=== TEXTO EXTRAIDO ===\n";
            output += data.texto_extraido || "(vacio)";
            output += "\n\n=== LINEAS ===\n";
            data.lineas.forEach((linea, idx) => {
                output += `[${idx}] "${linea}"\n`;
            });
            document.getElementById("resultado").value = output;
        })
        .catch(e => {
            document.getElementById("resultado").value = "Error: " + e.message;
        });
    }
</script>

</body>
</html>
