<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>OCR Paciente</title>
    <style>
        body { font-family: Arial; background: #f4f6f9; }
        .card {
            background: white;
            width: 400px;
            margin: 100px auto;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0px 0px 10px rgba(0,0,0,.1);
        }
        button {
            padding: 10px 20px;
            background: #0b5ed7;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>📋 Lector de Imagen Paciente</h2>
    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="imagen" accept="image/*" required>
        <br><br>
        <button type="submit">📥 Generar Excel</button>
    </form>
</div>

</body>
</html>
