<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Resultados Extraídos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #f4f6f9; padding: 20px; }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0px 0px 10px rgba(0,0,0,.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 { color: #333; }
        .btn-primary {
            background: #0b5ed7;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
        }
        .btn-primary:hover { background: #0056b3; }
        .table-responsive {
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,.1);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #0b5ed7;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: bold;
        }
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }
        tr:hover { background: #f9f9f9; }
        tr:last-child td { border-bottom: none; }
        .actions {
            display: flex;
            gap: 10px;
        }
        .btn-small {
            padding: 5px 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }
        .btn-download {
            background: #28a745;
            color: white;
        }
        .btn-download:hover { background: #218838; }
        .btn-delete {
            background: #dc3545;
            color: white;
        }
        .btn-delete:hover { background: #c82333; }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0b5ed7;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0, 0.5);
        }
        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }
        .close {
            font-size: 28px;
            font-weight: bold;
            color: #999;
            cursor: pointer;
        }
        .close:hover { color: #333; }
        .detail-row {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .detail-row strong {
            color: #0b5ed7;
            display: inline-block;
            width: 150px;
        }
        .auto-refresh {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .refresh-btn {
            background: #6c757d;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .refresh-btn:hover { background: #5a6268; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1>👀 Resultados Extraídos</h1>
            <p style="color: #666; font-size: 14px; margin-top: 5px;">Datos procesados de pacientes</p>
        </div>
        <div class="auto-refresh">
            <button class="refresh-btn" onclick="cargarResultados()">🔄 Actualizar</button>
            <a href="/descargar-todos" class="btn-primary" style="background:#28a745;">📥 Exportar Excel</a>
            <a href="/" class="btn-primary">← Volver Upload</a>
            <a href="/logout" class="refresh-btn" style="text-decoration:none;">🚪 Cerrar sesión</a>
        </div>
    </div>

    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p style="margin-top: 15px;">Cargando resultados...</p>
    </div>

    <div id="content" style="display: none;">
        <div class="table-responsive" id="tableContainer"></div>
    </div>

    <div id="emptyState" class="empty-state">
        <div class="empty-state-icon">📭</div>
        <p>No hay datos procesados aún</p>
        <p style="font-size: 12px; margin-top: 10px;">Los resultados aparecerán aquí cuando se procesen imágenes</p>
    </div>
</div>

<!-- Modal para ver detalles -->
<div id="detailModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>📋 Detalles del Paciente</h2>
            <span class="close" onclick="cerrarModal()">&times;</span>
        </div>
        <div id="detailContent"></div>
    </div>
</div>

<script>
    function cargarResultados() {
        document.getElementById("loading").style.display = "block";
        fetch("/api/resultados")
            .then(r => {
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                return r.json();
            })
            .then(data => mostrarResultados(data))
            .catch(e => {
                console.error("Error cargando resultados:", e);
                document.getElementById("loading").style.display = "none";
                document.getElementById("emptyState").style.display = "block";
            });
    }

    function mostrarResultados(resultados) {
        document.getElementById("loading").style.display = "none";
        
        if (!resultados || resultados.length === 0) {
            document.getElementById("emptyState").style.display = "block";
            document.getElementById("content").style.display = "none";
            return;
        }

        document.getElementById("emptyState").style.display = "none";
        document.getElementById("content").style.display = "block";

        const campos = ["Nombre", "Tipo de Documento", "Número Documento", "Edad", "Especialidad", "Diagnóstico"];
        let html = "<table><thead><tr>";
        
        campos.forEach(campo => {
            html += `<th>${campo}</th>`;
        });
        html += '<th>Acciones</th></tr></thead><tbody>';

        resultados.forEach((item, idx) => {
            html += "<tr>";
            campos.forEach(campo => {
                html += `<td>${item[campo] || '-'}</td>`;
            });
            html += `<td class="actions">
                <button class="btn-small btn-download" onclick="verDetalles(${idx})">👁️ Ver</button>
                <button class="btn-small btn-delete" onclick="eliminar(${idx})">🗑️ Eliminar</button>
            </td></tr>`;
        });

        html += "</tbody></table>";
        document.getElementById("tableContainer").innerHTML = html;
    }

    function verDetalles(idx) {
        fetch("/api/resultados")
            .then(r => {
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                return r.json();
            })
            .then(data => {
                if (data && data[idx]) {
                    const item = data[idx];
                    let html = "";
                    for (const [key, value] of Object.entries(item)) {
                        html += `<div class="detail-row"><strong>${key}:</strong> ${value || '-'}</div>`;
                    }
                    document.getElementById("detailContent").innerHTML = html;
                    document.getElementById("detailModal").style.display = "block";
                }
            })
            .catch(e => console.error("Error:", e));
    }

    function cerrarModal() {
        document.getElementById("detailModal").style.display = "none";
    }

    function descargarExcel(idx) {
        window.location.href = `/descargar/${idx}`;
    }

    function eliminar(idx) {
        if (confirm("¿Estás seguro de que deseas eliminar este registro?")) {
            fetch(`/eliminar/${idx}`, { method: "DELETE" })
                .then(() => cargarResultados());
        }
    }

    window.onclick = function(event) {
        const modal = document.getElementById("detailModal");
        if (event.target === modal) modal.style.display = "none";
    }

    // Auto-refresh cada 5 segundos
    cargarResultados();
    setInterval(cargarResultados, 5000);
</script>

</body>
</html>
