<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Debug OCR</title>
    <style>
        body { font-family: Arial; background: #f4f6f9; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,.1); }
        h1 { color: #333; }
        textarea { width: 100%; height: 400px; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-family: monospace; }
        button { padding: 10px 20px; background: #0b5ed7; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
        input[type="file"] { margin: 10px 0; }
        .info { background: #e7f1ff; padding: 15px; border-radius: 5px; margin: 20px 0; border-left: 4px solid #0b5ed7; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔍 Debug OCR</h1>
    <p>Sube una imagen para ver exactamente qué texto está extrayendo OCR</p>
    
    <div class="info">
        <strong>ℹ️ Instrucciones:</strong> Sube una imagen y verás el texto extraído. Esto te ayudará a ajustar los patrones regex.
    </div>

    <input type="file" id="fileInput" accept="image/*">
    <button onclick="enviar()">Procesar Imagen</button>

    <h3>Resultado OCR:</h3>
    <textarea id="resultado" readonly placeholder="El texto extraído aparecerá aquí..."></textarea>
</div>

<script>
    function enviar() {
        const file = document.getElementById("fileInput").files[0];
        if (!file) {
            alert("Selecciona una imagen primero");
            return;
        }

        const formData = new FormData();
        formData.append("imagen", file);

        fetch("/debug/text", {
            method: "POST",
            body: formData
        })
        .then(r => r.json())
        .then(data => {
            let output = "=== INFORMACIÓN ===\n";
            output += `Tamaño imagen: ${data.imagen_shape}\n`;
            output += `Caracteres extraídos: ${data.texto_length}\n\n`;
            output += "=== TEXTO EXTRAÍDO ===\n";
            output += data.texto_extraido || "(vacío)";
            output += "\n\n=== LÍNEAS ===\n";
            data.lineas.forEach((linea, idx) => {
                output += `[${idx}] "${linea}"\n`;
            });
            document.getElementById("resultado").value = output;
        })
        .catch(e => {
            document.getElementById("resultado").value = "Error: " + e.message;
        });
    }
</script>

</body>
</html>
